# Solver recommendations for 4C physics modules
# This encodes domain expertise: which solvers, preconditioners, and parameters
# work well for which problem classes.

poisson:
  description: "Stationary scalar diffusion equation"
  linear_solver:
    recommended: "UMFPACK"
    reason: "Direct solver is most robust for small-to-medium problems."
    alternative: "Belos with MueLu AMG for large problems (>100k DOFs)"
  time_integration: "Stationary"
  tips:
    - "For pure diffusion, use VELOCITYFIELD: Zero"
    - "SOLVERTYPE: linear_full is sufficient (problem is linear)"
    - "Single material MAT_scatra with DIFFUSIVITY parameter"

heat_equation:
  description: "Transient or stationary thermal conduction"
  linear_solver:
    recommended: "UMFPACK"
    alternative: "Belos with MueLu for large problems"
  time_integration:
    stationary: "Stationary"
    transient: "BDF2 or OneStepTheta"
  default_parameters:
    TIMESTEP: 0.01
    NUMSTEP: 100
  tips:
    - "Can use either Scalar_Transport (MAT_scatra) or Thermo (MAT_Fourier) problem type"
    - "For Thermo: use THERMAL DYNAMIC section with DYNAMICTYPE"
    - "Ensure mesh is fine enough to resolve thermal gradients"

linear_elasticity:
  description: "Small deformation structural mechanics"
  linear_solver:
    recommended: "Belos with MueLu AMG"
    reason: "AMG preconditioner is very effective for elasticity"
    muelu_config: "elasticity_template.xml"
    alternative: "UMFPACK for small problems (<50k DOFs)"
  nonlinear_solver:
    note: "Linear problem converges in 1 Newton iteration"
    MAXITER: 1
    TOLRES: 1.0e-8
    TOLDISP: 1.0e-8
  time_integration: "Statics"
  element_setup:
    KINEM: "linear"
  tips:
    - "Use KINEM: linear in ELEMENT_BLOCKS"
    - "MAT_Struct_StVenantKirchhoff is appropriate for linear elasticity"
    - "For 2D: add STRESS_STRAIN: plane_strain or plane_stress to element config"
    - "PREDICT: TangDis is a good default predictor"

nonlinear_elasticity:
  description: "Large deformation / nonlinear material structural mechanics"
  linear_solver:
    recommended: "Belos with MueLu AMG"
    muelu_config: "elasticity_template.xml"
  nonlinear_solver:
    MAXITER: 50
    TOLRES: 1.0e-8
    TOLDISP: 1.0e-8
    PREDICT: "TangDis"
  time_integration:
    quasi_static: "Statics"
    dynamic: "GenAlpha"
  element_setup:
    KINEM: "nonlinear"
  default_parameters:
    TIMESTEP: 0.1
    NUMSTEP: 10
  tips:
    - "Use KINEM: nonlinear in ELEMENT_BLOCKS"
    - "If convergence is slow, reduce TIMESTEP"
    - "For hyperelastic: MAT_ElastHyper with sub-materials (e.g. ELAST_CoupNeoHooke)"
    - "For plasticity: MAT_Struct_PlasticNlnLogNeoHooke"
    - "Load stepping via FUNCT with ramp function helps convergence"

structural_dynamics:
  description: "Time-dependent structural analysis with inertia"
  linear_solver:
    recommended: "Belos with MueLu AMG"
  nonlinear_solver:
    MAXITER: 50
    TOLRES: 1.0e-8
    TOLDISP: 1.0e-8
  time_integration:
    recommended: "GenAlpha"
    genalpha_defaults:
      BETA: 0.25
      GAMMA: 0.5
      ALPHA_M: 0.5
      ALPHA_F: 0.5
      RHO_INF: -1  # spectral radius at infinity
    alternative: "OneStepTheta (theta=0.5 for Crank-Nicolson)"
  default_parameters:
    TIMESTEP: 0.001
    NUMSTEP: 1000
  tips:
    - "DENS in material definition is critical for dynamics (mass matrix)"
    - "Time step should be small enough to resolve highest frequency of interest"
    - "Use Rayleigh damping (M_DAMP, K_DAMP) if needed"
    - "RESTARTEVERY for long simulations"

incompressible_fluid:
  description: "Incompressible Navier-Stokes equations"
  linear_solver:
    recommended: "Belos with block preconditioner"
    reason: "Saddle-point structure requires special preconditioning"
    alternative: "UMFPACK for small 2D problems"
  nonlinear_solver:
    NONLINITER: "Newton"
    ITEMAX: 50
  time_integration:
    recommended: "Np_Gen_Alpha"
    alternative: "BDF2"
  default_parameters:
    TIMESTEP: 0.01
    NUMSTEP: 100
  tolerances:
    TOL_VEL_RES: 1.0e-8
    TOL_VEL_INC: 1.0e-8
    TOL_PRES_RES: 1.0e-8
    TOL_PRES_INC: 1.0e-8
  tips:
    - "Reynolds number = DENSITY * U * L / DYNVISCOSITY determines flow regime"
    - "For Re > ~2000, consider turbulence modeling"
    - "Use stabilization (RESIDUAL-BASED STABILIZATION section)"
    - "GRIDVEL: BDF2 for ALE mesh motion in moving boundary problems"
    - "ADAPTCONV: true enables adaptive convergence checking"

fsi:
  description: "Coupled fluid-structure interaction"
  coupling:
    recommended: "iter_mortar_monolithicfluidsplit"
    alternative: "partitioned (simpler but slower convergence)"
  linear_solver:
    recommended: "Belos with block preconditioner"
    note: "Monolithic FSI needs specialized block solvers"
  tips:
    - "Requires STRUCTURE GEOMETRY + FLUID GEOMETRY + ALE"
    - "FSI coupling surfaces must match between fluid and structure"
    - "CLONING MATERIAL MAP needed to map materials to ALE field"
    - "SHAPEDERIVATIVES: true for consistent linearization"
    - "Start with coarse mesh and simple geometry to verify coupling"
    - "This is the most complex problem type - start simple"

contact:
  description: "Structural contact mechanics"
  strategy:
    recommended: "Penalty"
    penalty_param: 1.0e3
    alternative: "Lagrange (more accurate but harder to solve)"
    nitsche: "Nitsche (variationally consistent, no extra DOFs)"
  tips:
    - "PENALTYPARAM should be large enough for no-penetration but not too large (ill-conditioning)"
    - "Start with penalty, switch to Lagrange if accuracy needed"
    - "Contact surfaces need proper master/slave designation"
    - "Mortar-based contact is most robust"
    - "Use LM_SHAPEFCN: Standard in MORTAR COUPLING"
